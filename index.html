<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Nilai Rapor — SMP PGRI 13 Bogor</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --teal:#0d7c66; --teal-light:#e6f4f1; --teal-mid:#1a9e84; --teal-dark:#085045;
  --orange:#e07b39; --orange-light:#fff4ed;
  --bg:#f8faf9; --white:#ffffff; --text:#1a2e28; --muted:#6b8a82; --border:#d1e5e0;
  --danger:#c0392b; --danger-light:#fdf2f1; --success:#1a7a5e; --radius:10px;
  --shadow:0 2px 16px rgba(13,124,102,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--teal-dark);}
.login-box{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
.login-logo{text-align:center;margin-bottom:1.8rem;}
.school-icon{display:none;}
.school-icon svg{width:28px;height:28px;fill:white;}
.login-logo h1{font-family:'Noto Serif',serif;font-size:1.15rem;color:var(--teal-dark);font-weight:700;line-height:1.3;}
.login-logo p{font-size:0.78rem;color:var(--muted);margin-top:3px;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:0.78rem;font-weight:500;color:var(--muted);margin-bottom:5px;letter-spacing:0.04em;text-transform:uppercase;}
.form-group input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--teal-mid);background:white;}
.pass-wrap{position:relative;}
.pass-wrap input{padding-right:46px;}
.toggle-eye{position:absolute;right:0;top:0;height:100%;width:44px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);}
.toggle-eye:hover{color:var(--teal);}
.btn-login{width:100%;padding:11px;background:var(--teal);color:white;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;margin-top:0.5rem;transition:background 0.2s;}
.btn-login:hover{background:var(--teal-mid);}
.btn-login:disabled{background:#aaa;cursor:not-allowed;}
.login-error{background:var(--danger-light);color:var(--danger);border:1px solid #f5c6c2;border-radius:var(--radius);padding:9px 14px;font-size:0.85rem;margin-bottom:1rem;display:none;}
.login-foot{text-align:center;margin-top:1.2rem;font-size:0.72rem;color:var(--muted);}

/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--teal-dark);color:white;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{font-family:'Noto Serif',serif;font-size:1rem;font-weight:700;}
.topbar-role{background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:99px;font-size:0.72rem;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-user{font-size:0.82rem;color:rgba(255,255,255,0.75);}
.btn-logout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:5px 14px;border-radius:99px;font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
.btn-logout:hover{background:rgba(255,255,255,0.2);}
.main{flex:1;padding:1.5rem;max-width:1100px;margin:0 auto;width:100%;}

/* CONTROLS */
.page-header{margin-bottom:1.25rem;}
.page-header h2{font-family:'Noto Serif',serif;font-size:1.3rem;font-weight:700;color:var(--teal-dark);}
.page-header p{font-size:0.83rem;color:var(--muted);margin-top:3px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.ctrl-label{font-size:0.78rem;font-weight:500;color:var(--muted);}
.tab-btn{padding:7px 18px;border:1.5px solid var(--border);background:white;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s;}
.tab-btn.active{background:var(--teal);border-color:var(--teal);color:white;}
.tab-btn:hover:not(.active){border-color:var(--teal-mid);color:var(--teal);}
.mapel-select{padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--text);background:white;outline:none;cursor:pointer;}

/* TABLE */
.table-wrap{background:white;border-radius:12px;border:1px solid var(--border);overflow:auto;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;font-size:0.83rem;}
thead tr{background:var(--teal-dark);}
thead th{color:white;font-weight:500;padding:11px 12px;text-align:center;white-space:nowrap;font-size:0.78rem;}
thead th:first-child{text-align:left;padding-left:16px;}
tbody tr{border-bottom:1px solid #eef4f2;transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f4fbf8;}
tbody tr:nth-child(even){background:#fafcfb;}
tbody tr:nth-child(even):hover{background:#f4fbf8;}
td{padding:9px 12px;text-align:center;vertical-align:middle;}
td:first-child{text-align:left;padding-left:16px;font-weight:500;color:var(--text);font-size:0.82rem;}
td:nth-child(2){color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem;}
input.nilai-input{width:58px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:0.82rem;text-align:center;color:var(--text);background:white;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
input.nilai-input:focus{border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(13,124,102,0.1);}
.nilai-akhir{font-family:'DM Mono',monospace;font-weight:500;font-size:0.85rem;color:var(--teal-dark);}
.predikat-badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:0.7rem;font-weight:500;}
.pred-a{background:#d4edda;color:#155724;}
.pred-b{background:var(--teal-light);color:var(--teal-dark);}
.pred-c{background:#fff3cd;color:#856404;}
.pred-d{background:var(--orange-light);color:#7d3d0e;}
.pred-e{background:var(--danger-light);color:var(--danger);}
.ranking-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:0.72rem;font-weight:600;font-family:'DM Mono',monospace;}
.rank-1{background:#ffd700;color:#7a5c00;}
.rank-2{background:#e8e8e8;color:#555;}
.rank-3{background:#e8c29a;color:#7d3d0e;}
.rank-other{background:var(--teal-light);color:var(--teal-dark);}

/* BOTTOM BAR */
.bottom-bar{position:sticky;bottom:0;background:white;border-top:1px solid var(--border);padding:12px 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.save-status{font-size:0.8rem;color:var(--muted);}
.save-status.saved{color:var(--success);}
.save-status.unsaved{color:var(--orange);}
.save-status.saving{color:var(--teal);}
.btn-save{padding:9px 24px;background:var(--teal);color:white;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;transition:background 0.2s;}
.btn-save:hover{background:var(--teal-mid);}
.btn-save:disabled{background:#aaa;cursor:not-allowed;}

/* ADMIN */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem;}
.stat-card{background:white;border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;box-shadow:var(--shadow);}
.stat-card .stat-val{font-family:'Noto Serif',serif;font-size:2rem;font-weight:700;color:var(--teal-dark);line-height:1;}
.stat-card .stat-label{font-size:0.78rem;color:var(--muted);margin-top:4px;}
.export-btn{padding:8px 18px;background:var(--orange);color:white;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:500;cursor:pointer;transition:background 0.2s;}
.export-btn:hover{background:#c96b28;}
.section-label{font-size:0.72rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.mapel-progress-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:1.5rem;}
.mapel-prog-card{background:white;border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.mapel-prog-card:hover{border-color:var(--teal-mid);box-shadow:0 2px 8px rgba(13,124,102,0.1);}
.mp-name{font-weight:500;font-size:0.85rem;color:var(--text);}
.mp-guru{font-size:0.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.progress-bar-wrap{background:var(--border);border-radius:99px;height:4px;margin-top:8px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:99px;background:var(--teal);transition:width 0.4s;}
.hidden{display:none!important;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a2e28;color:white;padding:10px 20px;border-radius:99px;font-size:0.82rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}

/* LOADING OVERLAY */
#db-loading{position:fixed;inset:0;background:var(--teal-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
#db-loading p{color:rgba(255,255,255,0.8);font-size:0.9rem;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

// ── FIREBASE HELPERS ──────────────────────
function docId(kelas, mapel) {
  return kelas + "_" + mapel.replace(/\s+/g, "_");
}

async function loadNilai(kelas, mapel) {
  var key = docId(kelas, mapel);
  if (nilaiCache[key] !== undefined) return nilaiCache[key];
  try {
    var snap = await getDoc(doc(db, "nilai", key));
    var data = snap.exists() ? snap.data() : {};
    nilaiCache[key] = data;
    return data;
  } catch(e) {
    console.error("loadNilai error", e);
    return {};
  }
}

async function saveNilai(kelas, mapel, data) {
  var key = docId(kelas, mapel);
  await setDoc(doc(db, "nilai", key), data);
  nilaiCache[key] = data;
}

// ── CALC ──────────────────────────────────
function hitungNA(nh1, nh2, asts, asat) {
  var vals = [nh1, nh2, asts, asat].map(function(v) { return parseFloat(v) || 0; });
  return Math.round((vals[0]*0.30 + vals[1]*0.30 + vals[2]*0.15 + vals[3]*0.25)*100)/100;
}
function predikat(na) {
  if (na >= 90) return { text:"A — Sangat Baik", cls:"pred-a" };
  if (na >= 80) return { text:"B — Baik",        cls:"pred-b" };
  if (na >= 70) return { text:"C — Cukup",       cls:"pred-c" };
  if (na >= 60) return { text:"D — Kurang",      cls:"pred-d" };
  return             { text:"E — Sangat Kurang", cls:"pred-e" };
}
function getRanks(data, siswaList) {
  var arr = siswaList.map(function(nama) {
    var d = data[nama] || {};
    var has = d.nh1||d.nh2||d.asts||d.asat;
    return { nama: nama, na: has ? hitungNA(d.nh1,d.nh2,d.asts,d.asat) : null };
  }).filter(function(x) { return x.na !== null; });
  arr.sort(function(a,b) { return b.na - a.na; });
  var ranks = {};
  arr.forEach(function(x,i) { ranks[x.nama] = i+1; });
  return ranks;
}

    mapelTabs+'</div>'+
    '<div class="table-wrap"><table><thead><tr>'+
    '<th style="min-width:190px">Nama Siswa</th><th>No.</th><th>NH 1</th><th>NH 2</th><th>ASTS</th><th>ASAT</th><th>Nilai Akhir</th><th>Predikat</th><th>Ranking</th>'+
    '</tr></thead><tbody id="nilai-tbody">';

  siswa.forEach(function(nama, idx) {
    var d = data[nama] || {};
    var has = d.nh1||d.nh2||d.asts||d.asat;
    var na = has ? hitungNA(d.nh1,d.nh2,d.asts,d.asat) : null;
    var pred = na !== null ? predikat(na) : null;
    var rank = ranks[nama];
    var rCls = rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"rank-other";
    html += '<tr>'+
      '<td>'+nama+'</td>'+
      '<td>'+String(idx+1).padStart(2,"0")+'</td>'+
      '<td><input class="nilai-input" type="number" min="0" max="100" value="'+(d.nh1||"")+'" data-idx="'+idx+'" data-k="nh1" oninput="onInput(this)"></td>'+
      '<td><input class="nilai-input" type="number" min="0" max="100" value="'+(d.nh2||"")+'" data-idx="'+idx+'" data-k="nh2" oninput="onInput(this)"></td>'+
      '<td><input class="nilai-input" type="number" min="0" max="100" value="'+(d.asts||"")+'" data-idx="'+idx+'" data-k="asts" oninput="onInput(this)"></td>'+
      '<td><input class="nilai-input" type="number" min="0" max="100" value="'+(d.asat||"")+'" data-idx="'+idx+'" data-k="asat" oninput="onInput(this)"></td>'+
      '<td><span class="nilai-akhir" id="na-'+idx+'">'+(na!==null?na.toFixed(2):"—")+'</span></td>'+
      '<td><span class="predikat-badge '+(pred?pred.cls:"")+'" id="pred-'+idx+'">'+(pred?pred.text:"—")+'</span></td>'+
      '<td><span class="ranking-badge '+(rank?rCls:"")+'" id="rank-'+idx+'">'+(rank||"—")+'</span></td>'+
      '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById("main-content").innerHTML = html;
}

window.onInput = function(inp) {
  var v = parseFloat(inp.value);
  if (!isNaN(v)) { if(v<0) inp.value=0; if(v>100) inp.value=100; }
  unsaved = true;
  setStatus("Ada perubahan belum disimpan", "unsaved");
  var row = inp.closest("tr");
  var idx = parseInt(inp.dataset.idx);
  var inputs = row.querySelectorAll(".nilai-input");
  var vals = Array.from(inputs).map(function(i) { return i.value; });
  var hasAny = vals.some(function(v) { return v.trim() !== ""; });
  var naEl = document.getElementById("na-"+idx);
  var predEl = document.getElementById("pred-"+idx);
  if (!hasAny) { naEl.textContent="—"; predEl.className="predikat-badge"; predEl.textContent="—"; return; }
  var na = hitungNA(vals[0],vals[1],vals[2],vals[3]);
  var pred = predikat(na);
  naEl.textContent = na.toFixed(2);
  predEl.className = "predikat-badge "+pred.cls;
  predEl.textContent = pred.text;
  var tableData = getTableData();
  var ranks = getRanks(tableData, SISWA[currentKelas]);
  SISWA[currentKelas].forEach(function(nama, i) {
    var rEl = document.getElementById("rank-"+i);
    if (!rEl) return;
    var rank = ranks[nama];
    var rCls = rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"rank-other";
    rEl.className = "ranking-badge "+(rank?rCls:"");
    rEl.textContent = rank||"—";
  });
};

function getTableData() {
  var data = {};
  var siswa = SISWA[currentKelas];
  document.querySelectorAll(".nilai-input").forEach(function(inp) {
    var idx = parseInt(inp.dataset.idx);
    var nama = siswa[idx];
    if (!data[nama]) data[nama] = {};
    var v = parseFloat(inp.value);
    data[nama][inp.dataset.k] = isNaN(v) ? "" : v;
  });
  return data;
}

window.saveData = async function() {
  var btn = document.getElementById("btn-save");
  btn.disabled = true;
  setStatus("Menyimpan...", "saving");
  try {
    var data = getTableData();
    await saveNilai(currentKelas, currentMapel, data);
    unsaved = false;
    setStatus("Tersimpan ✓", "saved");
    showToast("Nilai berhasil disimpan ke database ✓");
  } catch(e) {
    setStatus("Gagal menyimpan!", "unsaved");
    showToast("Gagal simpan. Cek koneksi internet.");
  }
  btn.disabled = false;
};

function setStatus(msg, cls) {
  var el = document.getElementById("save-status");
  if (!el) return;
  el.textContent = msg;
  el.className = "save-status "+cls;
}

window.switchKelas = function(k) { if(unsaved) { if(!confirm("Simpan perubahan dulu?")) return; saveData(); } currentKelas=k; renderGuru(); };
window.switchMapel = function(m) { if(unsaved) { if(!confirm("Simpan perubahan dulu?")) return; saveData(); } currentMapel=m; renderGuru(); };

// ── ADMIN VIEW ────────────────────────────
async function renderAdmin() {
  document.getElementById("main-content").innerHTML = '<p style="padding:2rem;color:var(--muted);text-align:center">Memuat data dari database...</p>';

  // Load semua data untuk stats
  var total = SISWA["9A"].length + SISWA["9B"].length;
  var totalMapel = MAPEL_LIST.length;
  var totalEntri = 0;
  var allData = {};

  for (var ki = 0; ki < ["9A","9B"].length; ki++) {
    var k = ["9A","9B"][ki];
    allData[k] = {};
    for (var mi = 0; mi < MAPEL_LIST.length; mi++) {
      var m = MAPEL_LIST[mi];
      var d = await loadNilai(k, m);
      allData[k][m] = d;
      Object.keys(d).forEach(function(nama) {
        var v = d[nama]; if(v.nh1||v.nh2||v.asts||v.asat) totalEntri++;
      });
    }
  }

  var pct = total*totalMapel > 0 ? Math.round(totalEntri/(total*totalMapel)*100) : 0;
  if (!currentMapel) currentMapel = MAPEL_LIST[0];
  var siswaKelas = SISWA[currentKelas];
  var dataDetail = allData[currentKelas][currentMapel] || {};
  var ranks = getRanks(dataDetail, siswaKelas);

  var html = '<div class="page-header"><h2>Dashboard Administrator</h2><p>SMP PGRI 13 Bogor — Semester Genap 2025/2026 &nbsp;•&nbsp; Data real-time dari database</p></div>'+
    '<div class="admin-grid">'+
    '<div class="stat-card"><div class="stat-val">'+total+'</div><div class="stat-label">Total siswa (9A + 9B)</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+totalMapel+'</div><div class="stat-label">Mata pelajaran</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+totalEntri+'</div><div class="stat-label">Data nilai terinput</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+pct+'%</div><div class="stat-label">Kelengkapan keseluruhan</div></div>'+
    '</div>'+
    '<div class="controls" style="margin-bottom:1rem"><span class="ctrl-label">Kelas:</span>'+
    '<button class="tab-btn'+(currentKelas==="9A"?" active":"")+'" onclick="adminKelas(\'9A\')">Kelas 9A</button>'+
    '<button class="tab-btn'+(currentKelas==="9B"?" active":"")+'" onclick="adminKelas(\'9B\')">Kelas 9B</button>'+
    '<button class="export-btn" onclick="exportXLSX()">Export XLSX ↓</button>'+
    '<button class="tab-btn" onclick="renderAdmin()" style="margin-left:8px">🔄 Refresh</button></div>'+
    '<div class="section-label">Progres Input per Mata Pelajaran — Kelas '+currentKelas+'</div>'+
    '<div class="mapel-progress-grid">';

  MAPEL_LIST.forEach(function(m) {
    var d = allData[currentKelas][m] || {};
    var filled = siswaKelas.filter(function(n) { var v=d[n]||{}; return v.nh1||v.nh2||v.asts||v.asat; }).length;
    var p = Math.round(filled/siswaKelas.length*100);
    html += '<div class="mapel-prog-card" onclick="adminViewMapel(\''+m+'\')">'+
      '<div class="mp-name">'+m+'</div>'+
      '<div class="mp-guru">'+(MAPEL_GURU[m]||"—")+'</div>'+
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+p+'%"></div></div>'+
      '<div style="font-size:0.7rem;color:var(--muted);margin-top:4px">'+filled+'/'+siswaKelas.length+' siswa — '+p+'%</div>'+
      '</div>';
  });

  html += '</div><div class="section-label">Detail Nilai — Kelas '+currentKelas+'</div>'+
    '<div style="margin-bottom:10px"><select class="mapel-select" onchange="adminViewMapel(this.value)">'+
    MAPEL_LIST.map(function(m) { return '<option value="'+m+'"'+(m===currentMapel?" selected":"")+'>'+m+'</option>'; }).join("")+
    '</select></div>'+
    '<div class="table-wrap"><table><thead><tr>'+
    '<th style="min-width:190px">Nama Siswa</th><th>No.</th><th>NH 1</th><th>NH 2</th><th>ASTS</th><th>ASAT</th><th>Nilai Akhir</th><th>Predikat</th><th>Ranking</th>'+
    '</tr></thead><tbody>';

  siswaKelas.forEach(function(nama, idx) {
    var d = dataDetail[nama] || {};
    var has = d.nh1||d.nh2||d.asts||d.asat;
    var na = has ? hitungNA(d.nh1,d.nh2,d.asts,d.asat) : null;
    var pred = na !== null ? predikat(na) : null;
    var rank = ranks[nama];
    var rCls = rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"rank-other";
    html += '<tr>'+
      '<td>'+nama+'</td>'+
      '<td style="font-family:\'DM Mono\',monospace;font-size:0.75rem;color:var(--muted)">'+String(idx+1).padStart(2,"0")+'</td>'+
      '<td>'+(d.nh1||"—")+'</td><td>'+(d.nh2||"—")+'</td><td>'+(d.asts||"—")+'</td><td>'+(d.asat||"—")+'</td>'+
      '<td><span class="nilai-akhir">'+(na!==null?na.toFixed(2):"—")+'</span></td>'+
      '<td><span class="predikat-badge '+(pred?pred.cls:"")+'">'+(pred?pred.text:"—")+'</span></td>'+
      '<td><span class="ranking-badge '+(rank?rCls:"")+'">'+(rank||"—")+'</span></td>'+
      '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById("main-content").innerHTML = html;

  // store allData for export
  window._allData = allData;
}

window.adminKelas = function(k) { currentKelas=k; currentMapel=MAPEL_LIST[0]; renderAdmin(); };
window.adminViewMapel = function(m) { currentMapel=m; renderAdmin(); };

// ── EXPORT XLSX ───────────────────────────
window.exportXLSX = function() {
  if (typeof XLSX === "undefined") { alert("Library XLSX belum siap."); return; }
  var allData = window._allData || {};
  var wb = XLSX.utils.book_new();
  ["9A","9B"].forEach(function(kelas) {
    var siswa = SISWA[kelas];
    var h1 = ["No. Absen","Nama Siswa"];
    var h2 = ["",""];
    MAPEL_LIST.forEach(function(m) { h1.push(m,"","","","",""); h2.push("NH 1","NH 2","ASTS","ASAT","Nilai Akhir","Predikat"); });
    var rows = [h1, h2];
    siswa.forEach(function(nama, idx) {
      var row = [String(idx+1).padStart(2,"0"), nama];
      MAPEL_LIST.forEach(function(m) {
        var d = ((allData[kelas]||{})[m]||{})[nama] || {};
        var has = d.nh1||d.nh2||d.asts||d.asat;
        var na = has ? parseFloat(hitungNA(d.nh1,d.nh2,d.asts,d.asat).toFixed(2)) : "";
        var pred = has ? predikat(na).text.split(" — ")[0] : "";
        row.push(
          d.nh1!==undefined&&d.nh1!==""?parseFloat(d.nh1):"",
          d.nh2!==undefined&&d.nh2!==""?parseFloat(d.nh2):"",
          d.asts!==undefined&&d.asts!==""?parseFloat(d.asts):"",
          d.asat!==undefined&&d.asat!==""?parseFloat(d.asat):"",
          na, pred
        );
      });
      rows.push(row);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    if (!ws["!merges"]) ws["!merges"] = [];
    MAPEL_LIST.forEach(function(m, i) {
      var c = 2+i*6;
      ws["!merges"].push({s:{r:0,c:c},e:{r:0,c:c+5}});
    });
    var wscols = [{wch:10},{wch:28}];
    MAPEL_LIST.forEach(function() { [8,8,8,8,12,16].forEach(function(w){wscols.push({wch:w});}); });
    ws["!cols"] = wscols;
    XLSX.utils.book_append_sheet(wb, ws, "Kelas "+kelas);
  });
  XLSX.writeFile(wb, "Rekap_Nilai_SMPPGRI13_2025_2026.xlsx");
};
